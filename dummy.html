<html>
<head>
<script>
function readFile(input) {
  let file = input; //.files[0];

  let reader = new FileReader();

  reader.readAsText(file);

  reader.onload = function() {
    document.getElementById('foo').innerHTML = reader.result;
  };

  reader.onerror = function() {
   document.getElementById('foo').innerHTML = reader.error;
  };

}
function readFile2() {
const fs = require('fs') 
  
fs.readFile('dummy.html', (err, data) => { 
    if (err) throw err; 
  
    document.getElementById('foo').innerHTML =data.toString(); 
}) 
}
function loadDoc() {
  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
  document.getElementById("foo").innerHTML = "onreadystate";
  document.getElementById("foo").innerHTML = this.status;
    if (this.readyState == 4 && this.status == 200) {
  document.getElementById("foo").innerHTML = "onready in if";
      document.getElementById("foo").innerHTML =
      this.responseText;
    }
  };
  xhttp.open("GET", "https://petersonk-efsc.github.io/deskchecker/index.html", true);
  xhttp.send();
}
</script>
</head>
<body>
